name: CD — Build & Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.13
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install dependencies
        run: |
          pip install sv_ttk pyinstaller

      - name: Cache FFmpeg
        id: cache-ffmpeg
        uses: actions/cache@v4
        with:
          path: ffmpeg/ffmpeg.exe
          key: ffmpeg-8.1

      - name: Download FFmpeg
        if: steps.cache-ffmpeg.outputs.cache-hit != 'true'
        run: |
          New-Item -ItemType Directory -Path ffmpeg -Force | Out-Null
          Invoke-WebRequest -Uri "https://github.com/BtbN/FFmpeg-Builds/releases/download/latest/ffmpeg-master-latest-win64-gpl.zip" -OutFile "$env:TEMP\ffmpeg.zip"
          Expand-Archive -Path "$env:TEMP\ffmpeg.zip" -DestinationPath "$env:TEMP\ffmpeg_extracted" -Force
          $exe = Get-ChildItem -Path "$env:TEMP\ffmpeg_extracted" -Recurse -Filter "ffmpeg.exe" | Select-Object -First 1
          Copy-Item -Path $exe.FullName -Destination "ffmpeg\ffmpeg.exe" -Force

      - name: Build with PyInstaller
        run: |
          pyinstaller --onefile --windowed --add-data "ffmpeg/ffmpeg.exe;." --add-data "favicon.ico;." --icon favicon.ico --name "ImageToVideo" app.py

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ImageToVideo-${{ github.ref_name }}
          path: dist/ImageToVideo.exe

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          name: ${{ github.ref_name }}
          body_path: ${{ github.workspace }}/.github/release-notes.md
          files: dist/ImageToVideo.exe
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
